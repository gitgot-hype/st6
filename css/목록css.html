<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>목록 css</title>
  <style>
  *{margin: 0;padding: 0;
    body{margin: 30px;}

  li{background-color: #ccc;}
  
  /* .exam1 ol, .exam1 ul : .exam 후손 ol, .exam 후손 ul */
  ol.exam1, ul.exam1 {
    border: 1px solid #f00;
    padding-left: 3em; /**ol, ul 블릿 글러미표를 화면에 표시되는게 문제일떄는 padding-left 확인*/
    overflow: hidden;
    list-style: none;/* ul, ol의 글머리표 사용X*/
  }
  </style>

</head>
<body>
  <!-- ul>li*3>{menu$} -->
  <ul class="exam1">
    <li>menu1</li>
    <li>menu2</li>
    <li>menu3</li>
  </ul>
  <ol class="exam1">
    <li>menu1</li>
    <li>menu2</li>
    <li>menu3</li>
  </ol>
  <div class="exam2">
    <ol>
      <li>내용1</li>
      <li>내용2</li>
      <li>내용3</li>
    </ol>
  </div>
  <div class="exam2">
    <ul>
      <li>내용1</li>
      <li>내용2</li>
      <li>내용3</li>
    </ul>
  </div>
  <!-- 주로 아래 내용을 주로 사용한다. -->
  <style>
    .exam2 ol, .exam2 ul{
      list-style: none;
    }
    .exam2 li{
      padding-left: 20px;
      /* background-image: url(images/arrow-right.png);
      background-repeat: no-repeat;
      background-size: 12px;
      background-position: 0 6px; */
      /* 단축표기법 사용시 생략된 속성은 기본값으로 설정 */
      background: url(images/arrow-right.png) no-repeat  0 6px/12px;
    }
  </style>

</body>
</html>
