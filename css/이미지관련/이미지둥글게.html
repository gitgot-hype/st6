<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{margin: 0;padding: 0;}
    /* img{border: 1px solid #f00;} */
    body{margin: 50px;}
    .img-wrap{
      width: 200px;height: 200px;
      background-color: #fcc;
      margin-bottom: 50px;
      border-radius: 50%;
      /* 부모의 크기보다 넘쳐나는 것을 보이지 말아라 */
      overflow: hidden;
    }
    .img-wrap img{
      /* opacity: 0.5; */
      /* 무보의 너비 높이를 따라라 */
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .img-wrap:nth-child(2) img{
      object-position: center top;
    }
  </style>
</head>
<body>
  <div class="img-wrap"><img src="../images/img1.png" alt=""></div>
  <div class="img-wrap"><img src="../images/test-img.png"  alt=""></div>
</body>
</html>
