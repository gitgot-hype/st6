<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>object-fit</title>
</head>
<body>
  <img src="../images/test-img.png" alt="" class="exam1">
  <img src="../images/test-img.png" alt="" class="exam2">
  <img src="../images/test-img.png" alt="" class="exam3">
  <img src="../images/test-img.png" alt="" class="exam4">
  <style>
    .exam1{width: 200px;}
    .exam2{height: 300px;}
    /* 이미지 특정 크기로 표시해야할 때 : object fit  */
    .exam3{
      background-color: #fcc;
      width: 400px;height: 200px;
      /* 비율에 상관없이 오프젝트 영역으로 다보이게 */
      object-fit: fill;
      /* 이미지의 가로세로비율을 유지하고 다 보여줘 */
      object-fit: centain;
      /* 이미지를 가로세로비율을 유지하고 오브젝트 크기에 가득차게 */
      object-fit: cover;    
    }
    .exam4{
      background-color: #fcc;
      width: 400px;height: 200px;
      object-fit: cover ;
      object-position: top;    

    }
  </style>
</body>
</html>
