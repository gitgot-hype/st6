<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grid5-자동채우기(auto-fit) </title>
  <link rel="stylesheet" href="/reset.css">
  <!-- grid
  1. container 에게 grid 선언  container
  2. 행열 줄칸갯수, 크기 결정  container
  3. 암시적 그리드선언(생략가능)  container
  4. 아이템배치  item (생략 한줄 한칸)
  5. 여백
  6. 정렬
  -->
  <style>
    .wrap{
      margin: 50px;
    }
    /* 모양 */
    .grid-container{
      background-color: #ccc;
    }
    .grid-container .item{
      background-color: dodgerblue;
    }
    /* grid */
    .grid-container{
      display: grid;
      /* 2 행열갯수 킄기 지정 */
      /* repeat(빈복횟수 크기) */
      /* repeat(자동채우기예약어 크기)
      빈 아이템일대 어떻게 처리되는지 확인요
      auto-fill : 
      auto-fit
      */
      /* grid-template-columns: repeat(auto-fill, 100px); */
      grid-template-columns: repeat(auto-fit, 100px);
      grid-template-columns: repeat(auto-fill, minmax(100px, auto));
      grid-template-columns: repeat(auto-fit, minmax(100px, auto));
      grid-template-columns: repeat(auto-fill, minmax(320px, auto));/*빈트랙이 남는 경우 발생 우측 빈공간 발생가능*/
      grid-template-columns: repeat(auto-fit, minmax(320px, auto));
      /* 3 4 기본값으로 생략 */
      /* 5 */
      gap: 20px 20px
  
    }
    /* grid item */
    .grid-container .item{
      aspect-ratio: 1;

    }
    .grid-container .item:nth-child(1){
    }
    .grid-container .item:nth-child(2){
    }
    .grid-container .item:nth-child(3){
    }
    .grid-container .item:nth-child(4){
    }
    .grid-container .item:nth-child(5){
    }
    .grid-container .item:nth-child(6){
    }

  </style>
</head>
<body>
  <div class="wrap">
    <h1>@medaia없이 반응형으로 작성-auto-fit</h1>
    <div class="grid-container">
    <div class="item">아이템1</div>
    <div class="item">아이템2</div>
    <div class="item">아이템3</div>
    <div class="item">아이템4</div>
    <div class="item">아이템5</div>
    <div class="item">아이템6</div>
    <div class="item">아이템7</div>
    <div class="item">아이템8</div>
    </div>
  </div>
</body>
</html>
