<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grid 미리보기</title>
  <link rel="stylesheet" href="/reset.css">
  <!-- grid
  1. container 에게 grid 선언  container
  2. 행열 줄칸갯수, 크기 결정  container
  3. 암시적 그리드선언(생략가능)  container
  4. 아이템배치  item
  -->
  <style>
    .wrap{
      margin: 50px;
    }
    /* 모양 */
    .grid-container{
      background-color: #ccc;
      gap: 10px;
    }
    .grid-container .item{
      background-color: dodgerblue;
    }
    /* grid */
    .grid-container{
      display: grid;
      grid-template-rows: 100px 100px;
      /* grid-template-columns: 100px 100px 100px; */
      /* grid-template-columns: repeat(3, 100px); */
      /* 3, 1fr  : 전체 너비를 3등분 해 주세요.  예) row도 같은 방법으로 등분가능*/
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 100px;
    }
    /* grid item */
    .grid-container .item{

    }
    .grid-container .item:nth-child(1){
      grid-column: 1/3;
    }
    .grid-container .item:nth-child(2){
      grid-column: 3/4;
      grid-row: 1/3;
    }
    .grid-container .item:nth-child(3){
      grid-column: -1/-3;
    }
    .grid-container .item:nth-child(4){
      grid-row: 4/2;
    }
    .grid-container .item:nth-child(5){
      grid-column: 2/3;
      grid-row: 2/3;
    }

  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid-container">
    <div class="item">아이템1</div>
    <div class="item">아이템2</div>
    <div class="item">아이템3</div>
    <div class="item">아이템4</div>
    <div class="item">아이템5</div>
    <div class="item">아이템6</div>
    <div class="item">아이템7</div>
    <div class="item">아이템8</div>
    </div>
  </div>
</body>
</html>
