<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grid1 행열의 크기 지정 키워드 </title>
  <link rel="stylesheet" href="/reset.css">
  <!-- grid
  1. container 에게 grid 선언  container
  2. 행열 줄칸갯수, 크기 결정  container
  3. 암시적 그리드선언(생략가능)  container
  4. 아이템배치  item
  -->
  <style>
    .wrap{
      margin: 50px;
    }
    /* 모양 */
    .grid-container{
      background-color: #ccc;
    }
    .grid-container .item{
      background-color: dodgerblue;
      border: 1px solid magenta;
      box-sizing: border-box;
    }
    /* grid */
    .grid-container{
      display: grid;
      /* 2 */
      grid-template-rows: repeat(3, 100px);
       /*auto는 컨테이너이 남은 공간을 지정*/
      grid-template-columns: 100px auto 2rem;
      /* fr */
      grid-template-columns: 3fr 3fr 3fr 3fr;
      /* repeat */
      grid-template-columns: repeat(4, 3fr);
      /* minmax(최소갑, 최대값)  최소값에는 fr단위 사용하지 못함*/
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      grid-template-columns: repeat(3, minmax(150px, 33.33%));
      /* fit-content() 아이템의 내용이 최대크기보자 크지 않을 경우  content 내용에 맞추고, 내용이 제한한 최대크기보다 커질때는 최대 크기만 유지. */
      grid-template-columns:repeat(3, fit-content(300px)) ;
    }
    /* grid item */
    .grid-container .item{

    }
    .grid-container .item:nth-child(1){
    }
    .grid-container .item:nth-child(2){
    }
    .grid-container .item:nth-child(3){
    }
    .grid-container .item:nth-child(4){
    }
    .grid-container .item:nth-child(5){
    }
    .grid-container .item:nth-child(6){
    }

  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid-container">
    <div class="item">Lorem ipsum dolor sit.</div>
    <div class="item">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Obcaecati, aperiam?</div>
    <div class="item">아이템3</div>
    <div class="item">아이템4</div>
    <div class="item">아이템5</div>
    <div class="item">아이템6</div>
    <div class="item">아이템7</div>
    <div class="item">아이템8</div>
    </div>
  </div>
</body>
</html>
