<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>츼소선</title>
  <style>
    .exam1{
      text-decoration: underline;
    }
    .exam2{
      color: #ccc;
      /* text-decoration: line-through red ; */
      text-decoration: line-through currentColor;
      text-decoration: line-through ; /*윗줄과 동일한 의미*/
    }
    .exam1:hover{
      color: #f00;
    }
    p{
      display: none;
      box-sizing: border-box;
      background-color: aqua;
      width: 50%; height: 10vh;
      padding: 20px;
    }
    div:hover p{
      display: block;
    }
  </style>
</head>
<body>
  <ul>
    <li class="exam exam1">상품설명1</li>
    <li class="exam exam2">상품설명2</li>
    <li class="exam exam3">상품설명3</li>
  </ul>
  <div>Hover over this div to show the p element
    <p>Tada! Here I am!</p>
  </div>
  
</body>
</html>
