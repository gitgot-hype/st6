<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유튜브 반응혀응로 가져오기-박스모델의 이해</title>
  <style>
    *{margin: 0;padding: 0;}
    body{margin:50px;}
    /* 부모의 너비를 따르지만 768px이상은 되지 마라 */
    .media-box{max-width: 768px; background-color: #bbb;}
    .iframe-wrap{
      background-color: #ccf;
      width: 500px;
      height: 500px;
      padding: 500px;
      box-sizing: border-box;
      /* overflow: hidden; */
      
      position: relative;
    }
    .iframe-wrap .box{
      opacity: 0.5;
      background-color: #f00;
      /* 부모의 컨텐츠 영역을 다 사용 시 */
      position: absolute;
      left: 0; top: 0;
      /* 기준요소의 컨텐츠 영역을 사용 - 현재는 body가 기준요소. */
      width: 100%; height: 100%;
    }
  </style>
</head>
<body>
  <div class="media-box">
    <div class="iframe-wrap">
      <div class="box">Lorem ipsum dolor sit amet consectetur adipisicing elit. In laborum odit optio! Ad tempora odio accusamus eaque obcaecati voluptates aperiam tempore natus, in dolor sequi reiciendis quos minus, illo eos?</div>
    </div>
  </div>
</body>
</html>
