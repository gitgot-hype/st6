<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bord2er-radius</title>
  <style>
    *{margin: 0; padding: 0;}
    body{
      margin: 50px;
    }
    .box{
      width: 300px;
      height: 400px;
      border: 1px solid #000;
      border-radius: 50px;
      overflow: hidden;
    }
    .child{
      background-color: rgba(255,0,0,0.5);
      height: 100%;
    }
    /* 자식의 크기가 부모크기보다 넘쳐날때 overflow */

  </style>
</head>
<body>
  <div class="box">
    <div class="child">Lorem ipsum dolor sit amet consectetur adipisicing elit. Blanditiis similique veritatis distinctio fugit ipsam officia pariatur voluptatem, commodi tempora tenetur itaque expedita illum velit nobis assumenda natus ad totam corrupti!</div>
  </div>
</body>

</html>
