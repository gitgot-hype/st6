<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오로라 메시 그라디언트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .exam {
            width: 100%;
            height: 100vh;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(0, 255, 255, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 0, 255, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 80%, rgba(128, 0, 128, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, rgba(231, 202, 14, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 255, 255, 0.15) 0%, transparent 70%),
                linear-gradient(180deg, 
                    rgba(0, 0, 0, 0.8) 0%, 
                    rgba(20, 0, 40, 0.6) 30%,
                    rgba(40, 0, 60, 0.4) 50%,
                    rgba(20, 0, 40, 0.6) 70%,
                    rgba(0, 0, 30, 0.8) 100%);
        }

        .exam::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 10% 90%, rgba(0, 255, 255, 0.2) 0%, transparent 40%),
                radial-gradient(ellipse at 90% 10%, rgba(255, 0, 255, 0.2) 0%, transparent 40%),
                radial-gradient(ellipse at 60% 40%, rgba(128, 0, 128, 0.3) 0%, transparent 50%);
            pointer-events: none;
        }

        .text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="exam">
        <div class="text-container">
          <h1>오로라 매쉬</h1>
          <p>GRADIANT OVER DESIGN</p>
            <!-- 텍스트 내용 수정 가능 -->
        </div>
    </div>
</body>
</html>
