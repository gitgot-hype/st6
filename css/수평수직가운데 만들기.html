<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수평수직 가운데 만들기</title>
  <!-- 웹폰트 불러오기 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">

<!--

  font-optical-sizing: auto;
  font-weight: <weight>;
  font-style: normal;
} -->
  <!-- .nanum-pen-script-regular {

<style>
  *{margin: 0; padding: 0; box-sizing: border-box;}
  .exam{
    /* 브라우저 수평 수직 가득 채우기 */
    width: 100%; height: 100vh;
    background-color: #ccc;
    /* 인라인 .text-wrap 수평정렬 */
    text-align: center;
    /* 자식의 수직저열을 가운데 */
    align-content: center;
     background: 
                radial-gradient(ellipse at 20% 30%, rgba(0, 255, 255, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 0, 255, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 80%, rgba(128, 0, 128, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, rgba(231, 202, 14, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 255, 255, 0.15) 0%, transparent 70%),
                linear-gradient(180deg, 
                    rgba(0, 0, 0, 0.8) 0%, 
                    rgba(20, 0, 40, 0.6) 30%,
                    rgba(40, 0, 60, 0.4) 50%,
                    rgba(20, 0, 40, 0.6) 70%,
                    rgba(0, 0, 30, 0.8) 100%);
    
  }
  
  .exam .text-wrap{
    display: inline-block;
    /* 너비을 자식의 크기만큼만 */
  }
  .exam .text-wrap .title{
    /* 웹폰트 Nanum Pen Script */
    font-family: "Nanum Pen Script", cursive;
    font-size: 200px;
    color: #fff;
    font-weight: bold;
    letter-spacing: 30px;
    /* background-color: #f6b; */
    
    /* 텍스트 그림자 */
    /* text-shadow: 0px 0px 18px rgba(0, 0, 0, 0.8); */
    text-shadow:14px 4px 10px rgba(0, 0, 0, 0.8);
  }
  .exam .text-wrap .decs{
    /* 웹폰트 "Noto Sans KR", sans-serif */
    font-family: "Noto Sans KR", sans-serif;
    font-size: 30px;
    color: #fff;
    /* background-color: #6fb;  */
    margin-top: -50px;
    letter-spacing: 9px;
    font-weight: 150;
    text-shadow:14px 4px 10px rgba(0, 0, 0, 0.8);
  }
</style>

</head>
<body>
  <div class="exam">
    <div class="text-wrap">
      <div class="title">SALE</div>
      <div class="decs">여름을 전하는 감사 인사</div>
    </div>
  </div>
</body>
</html>
