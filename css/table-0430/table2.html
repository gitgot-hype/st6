<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>table css</title>
  <style>
    *{margin: 0;padding: 0;}
    body{margin: 50px;}
    table{
      border: 1px solid #000;
      margin-bottom: 20px;
    }
    table, tr, th, td{
      box-sizing: border-box;
    }
    tr{border: 1px solid #f00;}
    th, td{border: 1px solid #00f;}
    /* table1 */
    .table1{
      table-layout: auto;
      border-collapse: collapse;
      width: 100%;
    }
    /* table2 */
    .table2{
      /* 모든 테이블에 기본적으로 설정요. table-layout: fixed; border-collapse: collapse; */
      table-layout: fixed;
      border-collapse: collapse;
      width: 100%;
    }
    .table1 th:nth-child(1),
    .table1 dh:nth-child(1){
      width: 150px;
    }
    .table2 th:nth-child(1),
    .table2 dh:nth-child(1){
      width: 150px;
    }
    .table2 th:nth-child(2),
    .table2 dh:nth-child(2){
      width: 600px;
    }
  </style>
</head>
<body>
  <table class="table1">
    <tr>
      <th>제목1</th>
      <th>제목2</th>
      <th>제목3</th>
      <th>제목4</th>
    </tr>
    <tr>
      <td>Lorem, ipsum.</td>
      <td>Lorem, ipsum dolor.</td>
      <td>내용03</td>
      <td>내용04</td>
    </tr>
    <tr>
      <td>내용01</td>
      <td>내용02</td>
      <td>내용03</td>
      <td>내용04</td>
    </tr>
  </table>
  <table class="table2">
    <tr>
      <th>제목1</th>
      <th>제목2</th>
      <th>제목3</th>
      <th>제목4</th>
    </tr>
    <tr>
      <td>Lorem, ipsum dolor.</td>
      <td>Lorem, ipsum.</td>
      <td>내용03</td>
      <td>내용04</td>
    </tr>
    <tr>
      <td>내용01</td>
      <td>내용02</td>
      <td>내용03</td>
      <td>내용04</td>
    </tr>
  </table>
</body>
</html>
