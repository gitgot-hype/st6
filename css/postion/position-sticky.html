<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>position-sticky</title>
  <style>
    *{margin: 0;padding: 0; margin-bottom: 50px;}
    .section:nth-child(odd){
      background-color: #68f;
    }
    .section:nth-child(even){
      background-color: #f86;
    }
    .section-title,
    .content-wrap{
      width: 80%;
      box-sizing: border-box;
      margin: 0 auto;
    }
    .section{
      /* overflow: hidden; */
      /* 부모요소가 overflow:visible을 제외하고 overflo가 선언되었으면 자식요소는 sticky가 안됨 */
    }
    /* 브라우저 상단에 해당section이 보여지는 동안 section-title이 브라우저 상단에 고정하고 싶어요 
    누가? section-title
    배치법 postion:fixed;
    위치? 상단(위왼쪽) 고정
          top:0;
    기준> 브라우저
          브라우저의 위치 기준
          조건 : 섹션이 보이는 동안
                 셋션이 보이는 동안 section-title이 상단에 고정
    */
    /* 라우저 상단에 해당section이 보여지는 동안 section-title이 브라우저 상단에 고정하고 싶어요 
    누가? section-title
    배치법 postion:fixed;
    위치? 상단(위왼쪽) 고정
          top:0;
    기준> 브라우저
          브라우저의 위치 기준
          조건 : 섹션이 보이는 동안
                 부모요소가 브라우저랑의 위치가 어떻게?
                 left/right/top/bottom
    */
    .section .section-title{
      background-color: #fff;
      /* height: 50px; */
      /* line-height: 50px; 높이를 고정하고 싶을떄 글자 수직 가운데 */
      font-size: 1.3em;
      padding: 1em 2em; /*글자크기에 따라 수직크기가 달라짐*/
      position:sticky;
      top: 50px; 
      /*부모요소의 브라우저의 위치가 만나는 지점 본인요소가 처음에 위할 지점*/

    }
    .section .content-wrap{
      background-color: beige;
      height: 110vh;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- .section.section$*4>p.section-title+.content-wrap -->
    <div class="section section1">
      <p class="section-title">section1</p>
      <div class="content-wrap"></div>
    </div>
    <div class="section section2">
      <p class="section-title">section2</p>
      <div class="content-wrap"></div>
    </div>
    <div class="section section3">
      <p class="section-title">section3</p>
      <div class="content-wrap"></div>
    </div>
    <div class="section section4">
      <p class="section-title">section4</p>
      <div class="content-wrap"></div>
    </div>
  </div>
</body>
</html>
