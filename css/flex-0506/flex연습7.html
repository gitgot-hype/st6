<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex7- 상품목록</title>
  <link rel="stylesheet" href="/reset.css">
 <!-- 
  1. flex 선언 : container
  2. flex 방향을 결정 : conteainer
  3. 아이템이 축소/확장을 결정 : item
  4. 아이템이 크기결정 : item
  5. 아이템의 줄바꿈을 결정 container
  6. 여백관리 gap : dontener   margin : item
  7. 저열 container / item, margin
  -->
  <style>
   /* 모양 꾸미기 */
    .ec-base-product{background-color: #ccc;}
    .ec-base-product .prdList{background-color: #fcc;}
    .ec-base-product .prdList >li{
      opacity: 0.5;
      box-sizing: border-box;
      border: 1px solid #000;
      background-color: #cff;
      padding: 1rem;
    }

   /* flex */
    .ec-base-product{}
    /* flex containe .prdList */
    .ec-base-product .prdList{
      display: flex;
      /* flex-direction: row; */
      flex-wrap: wrap;
      gap: 20px;
      /* justify-content:flex-start, align-items:stretch; */
    }
    /* flex item width:auto; height:auto 기본값 (내용의 크기만큼만 요소의 크기가 되어라) */
    /* flex item .prdList>li */
    /* pc4단 tablet 3단  mobile: 2단 */
    .ec-base-product .prdList >li{
      /* flex-grow: 0; */
      flex-shrink: 0; 
      /* flex-basis, width(row) height(column) */
      /* width: 25% ; 여백이 없을떄 */
      width: calc(25% - (20px * (4 - 1)/4));
      aspect-ratio: 2/1;
    }
    @media (max-width:1024px){
      /* tablet 3단 */
      .ec-base-product .prdList >li3.98
         width: calc(33.33% - (20px * (3 - 1)/3));
      }
    } /* // @media (max-width:1024px) */
    @media (max-width:767.98px){
      /* mobile 2단 */
      .ec-base-product .prdList >li{
         width: calc(50% - (20px * (2 - 1)/2));
      }
    }
  </style>
</head>
<body>
  <div class="ec-base-product">
    <ul class="prdList">
      <li>아이템1</li>
      <li>아이템2</li>
      <li>아이템3</li>
      <li>아이템4</li>
      <li>아이템5</li>
      <li>아이템6</li>
      <li>아이템7</li>
      <li>아이템8</li>
    </ul>
  </div>
</body>
</html>
