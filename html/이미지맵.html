<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- 현재 내문서의 인코딩방법을 알려줌. 브라우저가 이걸 확인후 해석함. 2byte 기본인 경우 
  <meta charset="UTF-8"> -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--  이건 모바일에만 해당되는 내용
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  -->
  <title>이미지맵</title>
</head>
<body>
  <h1>이미지에 링크하기</h1>
  <hr>
  <!-- -->
  <div class="exam">
    <!-- 이미지정보가 필요없는 경우  alt는 비워둠
     <img src="asset/logo.png" alt=""> -->
    <a href="" class="sample"><img src="asset/logo.png" alt=""></a>
    <!-- 모든 이미지는 사각형. -->
  </div>
  <h2>이미지맵 - 하나의 이미지에 여러개 링크</h2>
  <div class="exam">
    <!-- 하나의 이미지에 여러개의 링크를 걸때 -->
    <img src="image-multimedia/image/imagemap-sample.jpg" alt="이미지맵연습">
    <!-- Image Map Generated by http://www.image-map.net/ -->
<img src="image-multimedia/image/imagemap-sample.jpg" usemap="#image-map1">

<!-- name 속성의 이름은 문서내에 유일해야한다. 이미지맵에서 가져오는 경우 name을 확인후 수정해야하나다. -->
<map name="image-map1">
    <area target="_blank" alt="네이버로 이동" title="네이버로 이동" href="https://www.naver.com" coords="71,354,272,505" shape="rect">
    <area target="_self" alt="깃허브로 이동" title="깃허브로 이동" href="https://www.github.com" coords="609,419,102" shape="circle">
    <area target="" alt="구글로 이동" title="구글로 이동" href="https://www.google.com" coords="283,198,224,266,399,366,397,265" shape="poly">
</map>
  </div>
</body>
</html>
