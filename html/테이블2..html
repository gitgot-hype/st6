<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테이블2</title>
</head>
<body>
  <!-- 4줄 5칸
   tr*4>td*5{내용}
    -->
  <table border="1"  width="80%">
    <tr>
      <!-- 1번째 즐 -->
      <td rowspan="2">내용</td>
      <td colspan="4">내용</td>
      <!-- 칸 합치기
      <td>내용</td>
      <td>내용</td>
      <td>내용</td> -->
    </tr>
    <tr>
      <!-- 2번째 줄 -->
      <!-- 줄 합치기 <td>내용</td> -->
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
    <tr>
      <!-- 3번째 줄 -->
      <td rowspan="2">내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
    <tr>
      <!-- 4번쨰 줄 -->
      <!-- 줄 합기기 <td>내용</td> -->
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
    </tr>
  </table>
</body>
</html>
